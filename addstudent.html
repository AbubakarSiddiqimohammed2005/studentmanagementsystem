<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Add Student</h1>

    <form action="viewstudent.html">

        <label>Student Name</label>
        <input type="text" placeholder="Enter student name" required>

        <label>Roll Number</label>
        <input type="text" placeholder="Enter roll number" required>

        <label>Branch</label>
        <input type="text" placeholder="Enter branch" required>

        <label>CGPA</label>
        <input type="number" step="0.01" min="0" max="10" placeholder="Enter CGPA" required>

        <button type="submit">Add Student</button>

    </form>

</body>
</html>
